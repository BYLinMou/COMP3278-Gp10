services:
  db:
    image: mysql:8.4
    container_name: hkugram-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: hkugram
      MYSQL_USER: hkugram
      MYSQL_PASSWORD: hkugram
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build:
      context: ./backend
    container_name: hkugram-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env.example
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    image: node:22-alpine
    container_name: hkugram-frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    volumes:
      - ./frontend:/app
    environment:
      VITE_API_BASE_URL: http://127.0.0.1:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  mysql_data:
